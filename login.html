<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fast Food Bites</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/login.css"> 
</head>

<body>

<div class="login-wrapper">

    <!-- Panel izquierdo -->
    <div class="login-brand-panel">
        <h1 class="brand-title">Fast Food<br>Bites</h1>
        <p class="brand-subtitle">Comida rápida</p>

        <div class="brand-features">
            <div class="brand-feature">Ingredientes frescos</div>
            <div class="brand-feature">Entrega en 30 min</div>
            <div class="brand-feature">Calidad</div>
            <div class="brand-feature">Pago fácil y seguro</div>
        </div>
    </div>

    <!-- Panel derecho -->
    <div class="login-form-panel">
        <h2 class="login-title">Bienvenido</h2>
        <p class="login-desc">Inicia sesión para ver nuestro menú</p>

        <div class="login-error" id="loginError">
            <span></span>
        </div>

        <div class="login-hint">
            Prueba: <strong>usuario@gmail.com</strong> / <strong>contraseña123</strong>
        </div>

        <!-- Formulario de inicio de sesión -->
         <form id="loginForm" novalidate>

            <div class="form-field">
                <label>Correo electrónico</label>
                <input type="email" id="emailInput" required>
            </div>

            <div class="form-field">
                <label>Contraseña</label>
                <input type="password" id="passwordInput" required>
                <button type="button" id="togglePasswordBtn"></button>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary btn-login">
                Iniciar sesión →
            </button>

        </form>

    </div>
</div>
<script src="assets/js/login.js"></script>

</body>
</html>
